<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --mint:    #b8f0e0;
            --sage:    #6b9e8f;
            --dark1:   #1e2b28;
            --dark2:   #171f1d;
            --dark3:   #3d5049;
        }
        body {
            background: var(--dark2);
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        /* Dot grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(107,158,143,0.25) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }
        .card {
            background: var(--dark1);
            border-radius: 32px;
            padding: 52px 44px;
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 1;
        }
        h1 {
            color: #e8f5f1;
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }
        label {
            display: block;
            color: #c0d8d0;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input[type="password"], input[type="email"], input[type="text"] {
            width: 100%;
            background: var(--dark2);
            border: none;
            border-radius: 14px;
            color: #e8f5f1;
            font-family: 'Fredoka', sans-serif;
            font-size: 17px;
            padding: 16px 20px;
            outline: none;
            margin-bottom: 20px;
            transition: box-shadow 0.2s;
        }
        input:focus {
            box-shadow: 0 0 0 2px var(--sage);
        }
        .btn {
            display: block;
            width: 100%;
            border: none;
            border-radius: 14px;
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 500;
            padding: 16px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 12px;
            text-align: center;
            text-decoration: none;
        }
        .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--mint); color: var(--dark2); }
        .error {
            color: var(--mint);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 15px;
            text-align: center;
            min-height: 20px;
        }
        .success {
            color: var(--mint);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 15px;
            text-align: center;
        }
        .toggle-link {
            text-align: center;
            color: #c0d8d0;
            font-size: 15px;
        }
        .toggle-link a {
            color: var(--mint);
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Login</h1>
        
        <div class="error" id="error-message"></div>
        <div class="success" id="success-message"></div>

        <form id="auth-form">
            <label id="email-label">Email</label>
            <input type="email" id="email" placeholder="jouw@email.com" required>
            
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" placeholder="••••••••" required>
            
            <button type="submit" class="btn btn-primary" id="auth-btn">Inloggen</button>
        </form>

        <div class="toggle-link">
            <span id="toggle-text">Nog geen account? </span>
            <a id="toggle-link">Registreer hier</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCBWYgplbhCzOx6G0_Fb5xEMBdIyGFVcVM",
            authDomain: "dashboard-1cea2.firebaseapp.com",
            projectId: "dashboard-1cea2",
            storageBucket: "dashboard-1cea2.firebasestorage.app",
            messagingSenderId: "911950089916",
            appId: "1:911950089916:web:36413c7d3267aca1438ab9",
            measurementId: "G-F4G4183JSF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check of gebruiker al ingelogd is
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        const form = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authBtn = document.getElementById('auth-btn');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        const toggleLink = document.getElementById('toggle-link');
        const title = document.getElementById('title');
        const toggleText = document.getElementById('toggle-text');

        let isSignup = false;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isSignup = !isSignup;
            
            if (isSignup) {
                title.textContent = 'Registreer';
                authBtn.textContent = 'Registreren';
                toggleText.textContent = 'Al een account? ';
                toggleLink.textContent = 'Inloggen';
            } else {
                title.textContent = 'Login';
                authBtn.textContent = 'Inloggen';
                toggleText.textContent = 'Nog geen account? ';
                toggleLink.textContent = 'Registreer hier';
            }
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            errorDiv.textContent = '';
            successDiv.textContent = '';
            authBtn.disabled = true;

            try {
                if (isSignup) {
                    await createUserWithEmailAndPassword(auth, email, password);
                    successDiv.textContent = 'Account aangemaakt! Je wordt doorgestuurd...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    successDiv.textContent = 'Ingelogd! Je wordt doorgestuurd...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                let errorText = 'Er is een fout opgetreden';
                
                if (error.code === 'auth/user-not-found') {
                    errorText = 'Account niet gevonden';
                } else if (error.code === 'auth/wrong-password') {
                    errorText = 'Wachtwoord onjuist';
                } else if (error.code === 'auth/email-already-in-use') {
                    errorText = 'Dit emailadres is al in gebruik';
                } else if (error.code === 'auth/weak-password') {
                    errorText = 'Wachtwoord moet minstens 6 karakters zijn';
                } else if (error.code === 'auth/invalid-email') {
                    errorText = 'Ongeldig emailadres';
                }
                
                errorDiv.textContent = errorText;
                authBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
