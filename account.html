<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <nav class="menu">
        <a href="index.html" class="link">
            <i data-lucide="layout-grid"></i>
            <span class="label">Dashboard</span>
        </a>
        <a href="home-assistant.html" class="link">
            <i data-lucide="home"></i>
            <span class="label">HA</span>
        </a>
        <a href="settings.html" class="link">
            <i data-lucide="settings"></i>
            <span class="label">Instellingen</span>
        </a>
        <div class="profile-wrap">
            <button class="profile-trigger" id="profileBtn" type="button" aria-expanded="false">
                <span class="profile-avatar">TH</span>
            </button>
            <div class="profile-menu" id="profileMenu" role="menu">
                <a href="account.html" class="profile-item"><span class="menu-item-icon"><i class="fa fa-user"></i></span>Account details</a>
                <a href="settings.html" class="profile-item"><span class="menu-item-icon"><i class="fa fa-cog"></i></span>Instellingen</a>
                <a href="home-assistant.html" class="profile-item"><span class="menu-item-icon"><i class="fa fa-house"></i></span>Home Assistant</a>
                <div class="menu-item-divider"></div>
                <button type="button" class="profile-item logout-item" id="logout-btn"><span class="menu-item-icon"><i class="fa fa-sign-out-alt"></i></span>Uitloggen</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="dashboard">
            <div id="topbar">
                <div id="topbar-left">
                    <div id="topbar-title"><i class="fa fa-user-circle"></i> Account details</div>
                    <div id="topbar-host">Gebruikersprofiel</div>
                </div>
                <div id="topbar-right">
                    <div id="topbar-clock">00:00:00</div>
                    <div id="topbar-date">─</div>
                </div>
            </div>

            <div class="panel panel-left" style="margin-top:16px;">
                <div class="panel-header"><span>Mijn account</span></div>
                <div class="panel-body">
                    <div class="f-group">
                        <label class="f-label">Naam</label>
                        <input class="f-input" type="text" value="Thomas" readonly>
                    </div>
                    <div class="f-group">
                        <label class="f-label">Email</label>
                        <input class="f-input" type="email" value="thomas@example.com" readonly>
                    </div>
                    <div class="f-group">
                        <label class="f-label">Rol</label>
                        <input class="f-input" type="text" value="Administrator" readonly>
                    </div>
                    <div class="f-group">
                        <label class="f-label">Account status</label>
                        <div class="d-status-bar" style="padding:0.85rem 1rem; border-radius:14px;">
                            <div class="d-status-icon ok"><i class="fa fa-circle-check"></i></div>
                            <div class="d-status-text">
                                <h3>Ingelogd</h3>
                                <p>Je account is actief en beveiligd.</p>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;">
                        <button class="btn btn-primary" onclick="alert('Pas hier je accountinstellingen aan.');"><i class="fa fa-pen"></i> Bewerken</button>
                        <button class="btn btn-secondary" onclick="window.location.href='settings.html'"><i class="fa fa-cog"></i> Ga naar instellingen</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCBWYgplbhCzOx6G0_Fb5xEMBdIyGFVcVM",
            authDomain: "dashboard-1cea2.firebaseapp.com",
            projectId: "dashboard-1cea2",
            storageBucket: "dashboard-1cea2.firebasestorage.app",
            messagingSenderId: "911950089916",
            appId: "1:911950089916:web:36413c7d3267aca1438ab9",
            measurementId: "G-F4G4183JSF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Logout fout:', error);
            }
        });
    </script>
    <script src="scripts.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
